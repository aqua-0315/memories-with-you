<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- パスワード画面 -->
    <div id="password-screen">
      <div class="password-box">
        <p class="password-label">Happy Birthday</p>
        <p class="password-message">2人の専用サイト</p>
        <input
          type="password"
          id="password-input"
          placeholder="パスワードを入力"
        />
        <button id="password-button">開く</button>
        <p id="password-error">パスワードが違います</p>
      </div>
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content">
      <!-- ヒーローセクション -->
      <section id="hero">
        <img src="images/main-photo.jpg" alt="メイン写真" class="hero-photo" />
        <div class="hero-text">
          <p class="hero-title">Happy Birthday</p>
          <p class="hero-name">もか へ</p>
        </div>
        <div class="scroll-down">
          <span>↓</span>
        </div>
      </section>

      <!-- 記念日カウント -->
      <section id="anniversary">
        <div class="anniversary-card">
          <p class="anniversary-label">出会ってから</p>
          <p class="anniversary-number"><span id="days-since-met">0</span>日</p>
        </div>
        <div class="anniversary-card">
          <p class="anniversary-label">付き合って</p>
          <p class="anniversary-number">
            <span id="days-since-dating">0</span>日
          </p>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
