<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- パスワード画面 -->
    <div id="password-screen">
      <div class="password-box">
        <p class="password-label">Happy Birthday</p>
        <p class="password-message">2人の専用サイト</p>
        <input
          type="password"
          id="password-input"
          placeholder="パスワードを入力"
        />
        <button id="password-button">開く</button>
        <p id="password-error">パスワードが違います</p>
      </div>
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content">
      <!-- ヒーローセクション -->
      <section id="hero">
        <img src="images/main-photo.jpg" alt="メイン写真" class="hero-photo" />
        <div class="hero-text">
          <p class="hero-title">Happy Birthday</p>
          <p class="hero-name">もか へ</p>
        </div>
        <div class="scroll-down">
          <span>↓</span>
        </div>
      </section>

      <!-- 記念日カウント -->
      <section id="anniversary">
        <div class="anniversary-card">
          <p class="anniversary-label">出会ってから</p>
          <p class="anniversary-number"><span id="days-since-met">0</span>日</p>
        </div>
        <div class="anniversary-card">
          <p class="anniversary-label">付き合って</p>
          <p class="anniversary-number">
            <span id="days-since-dating">0</span>日
          </p>
        </div>
      </section>

      <!-- 思い出ギャラリー -->
      <section id="gallery">
        <h2 class="section-title">思い出ギャラリー</h2>

        <div class="gallery-grid">
          <div class="gallery-card">
            <img
              src="images/memory1.jpg"
              alt="思い出の写真1"
              class="gallery-photo"
            />
            <p class="gallery-card-title">初めて行った場所</p>
            <p class="gallery-card-comment">この日はすごく楽しかったね</p>
            <p class="gallery-card-date">2026.05.24</p>
          </div>

          <div class="gallery-card">
            <img
              src="images/memory2.jpg"
              alt="思い出の写真2"
              class="gallery-photo"
            />
            <p class="gallery-card-title">2回目のデート</p>
            <p class="gallery-card-comment">天気が良くて気持ちよかったね</p>
            <p class="gallery-card-date">2026.06.06</p>
          </div>
        </div>
      </section>

      <!-- 思い出タイムライン -->
      <section id="timeline">
        <h2 class="section-title">思い出タイムライン</h2>

        <div class="timeline-list">
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <p class="timeline-date">2026.05.24</p>
              <p class="timeline-text">出会った日</p>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <p class="timeline-date">2026.06.06</p>
              <p class="timeline-text">付き合った日</p>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <p class="timeline-date">2026.07.13</p>
              <p class="timeline-text">誕生日</p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- 画像拡大表示用モーダル -->
    <div id="image-modal">
      <img id="modal-image" src="" alt="拡大画像" />
    </div>

    <script src="script.js"></script>
  </body>
</html>
